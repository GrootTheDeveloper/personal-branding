<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8"/>
  <title>QR Code</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:#0C0C0C;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      min-height:100vh;gap:20px;
      font-family:sans-serif;
    }
    #qr-wrap{
      background:#fff;
      padding:20px;
      border-radius:12px;
    }
    #qr-wrap canvas,#qr-wrap img{display:block;}
    .url{color:rgba(255,255,255,.4);font-size:12px;letter-spacing:.5px;}
    .dl{
      background:#C8F135;color:#000;
      padding:9px 22px;border-radius:100px;
      font-size:13px;font-weight:700;
      border:none;cursor:pointer;text-decoration:none;
    }
  </style>
</head>
<body>
  <div id="qr-wrap"><div id="qr"></div></div>
  <div class="url">grootthedeveloper.github.io/personal-branding</div>
  <a class="dl" id="dl-btn" download="qr_lehau.png">⬇ Tải QR Code</a>

  <script>
    const url = "https://grootthedeveloper.github.io/personal-branding/";
    const qr = new QRCode(document.getElementById("qr"), {
      text: url,
      width: 300,
      height: 300,
      colorDark: "#0C0C0C",
      colorLight: "#FFFFFF",
      correctLevel: QRCode.CorrectLevel.H
    });

    // enable download after render
    setTimeout(() => {
      const canvas = document.querySelector('#qr canvas');
      if (canvas) {
        document.getElementById('dl-btn').href = canvas.toDataURL('image/png');
      }
    }, 500);
  </script>
</body>
</html>
